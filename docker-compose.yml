services:
  db:
    image: postgis/postgis:16-3.4
    environment: {POSTGRES_USER: geoscan, POSTGRES_PASSWORD: geoscan, POSTGRES_DB: geoscan}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck: {test: ["CMD-SHELL","pg_isready -U geoscan"], interval: 5s, timeout: 3s, retries: 10}
  api:
    build: {context: ./backend, dockerfile: Dockerfile.api}
    environment:
      GEOSCAN_DATABASE_URL: postgresql+psycopg2://geoscan:geoscan@db:5432/geoscan
    ports: ["8000:8000"]
    volumes:
      - ./backend/storage:/app/storage
      - ./backend/models:/app/models
      - ./backend/datasets:/app/datasets
      - ./backend/feedback_data:/app/feedback_data
    depends_on: {db: {condition: service_healthy}}
  flask:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install flask requests -q && python app.py"
    environment: {GEOSCAN_BACKEND_URL: http://api:8000, FLASK_PORT: 8080, FRONTEND_DIR: /frontend}
    ports: ["8080:8080"]
    volumes:
      - ./flask:/app
      - ./frontend:/frontend:ro
    depends_on: [api]
volumes:
  pgdata:
